# Which classifier decides the tier: "llm" (gpt-4o-mini judges each prompt,
# needs OPENAI_API_KEY billing) or "tfidf" (free, local, ~63-65% accuracy on
# real prompts -- see app/classifier/train.py). Falls back automatically
# only if you set it to "tfidf" yourself; no auto-detection of missing keys.
classifier_backend: llm

# Tier -> model registry key (see app/models/registry.py MODEL_REGISTRY).
# Editable at runtime via PUT /v1/routing-config — no redeploy needed.
tier_to_model:
  1: llama-local
  2: gpt-4o-mini
  3: claude-sonnet

# If the classifier's confidence is below this, escalate one tier before
# even sending the first request (belt-and-suspenders against a bad call).
min_confidence: 0.55

# Judge model used by the async verifier (Phase 3) and for escalations.
judge_model: gpt-4o
